<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Atyant Loan Solutions</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="profile text-center">
    <i class="bi bi-person-circle profile-icon" id="profileBtn"></i>
    <h5 id="adminName">Admin</h5>

    <ul class="profile-dropdown" id="profileDropdown">
      <li id="profileMenu"><i class="bi bi-person"></i> Profile</li>
      <li id="settingsMenu"><i class="bi bi-gear"></i> Settings</li>
      <li id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</li>
    </ul>
  </div>

  <ul class="nav-links">
    <li data-content="create"><i class="bi bi-person-plus"></i> Create User</li>
    <li data-content="delete"><i class="bi bi-person-x"></i> Delete User</li>
    <li data-content="disbursement"><i class="bi bi-cash-stack"></i> Disbursement</li>
    <li data-content="attendance"><i class="bi bi-calendar-check"></i> Attendance</li>
    <li data-content="report"><i class="bi bi-bar-chart"></i> Report</li>
  </ul>
</div>

<!-- Main Content -->
<div class="main-content" id="main-content">
  <h2>Welcome to Admin Dashboard</h2>
  <p>Select an option from the sidebar.</p>
</div>

<script src="dashboard.js"></script>
</body>
</html>
